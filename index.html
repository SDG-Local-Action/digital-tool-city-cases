<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital tool city cases</title>
    <style>
        :root {
            --primary-color: #3B9AB2; /* Wes Anderson Blue */
            --bg-color: #f4f4f9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 { color: #2C3E50; margin-bottom: 10px; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            text-align: center;
            border-top: 5px solid var(--primary-color);
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; color: #2C3E50; }
        .card p { font-size: 0.9em; color: #666; height: 60px; overflow: hidden; }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<header>
    <h1>Digital tool city cases</h1>
    <p>Mapping regional and local government cases of digital tools</p>
</header>

<div class="grid-container">
    <div class="card" style="border-top-color: #f39193;">
        <h3>Overview</h3>
        <p>Overview of digital tool use cases</p>
        <a href="digital-tools_map.html" class="btn">View Map</a>
    </div>
</div>

</body>
</html>
